<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HYPHSWORLD | Vault Logout</title>
  <meta name="description" content="Logout from the HYPHSWORLD Vault access session." />

  <style>
    :root {
      --black: #050505;
      --green: #45ff36;
      --yellow: #ffe45c;
      --pink: #ff4fd8;
      --blue: #42ccff;
      --white: #ffffff;
      --muted: #c7ced8;
      --rainbow: linear-gradient(90deg, var(--green), var(--yellow), var(--pink), var(--blue), var(--green));
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--white);
      background:
        radial-gradient(circle at 20% 20%, rgba(69,255,54,.20), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,79,216,.16), transparent 32%),
        var(--black);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .card {
      width: min(620px, 100%);
      padding: clamp(22px, 5vw, 38px);
      border: 1px solid rgba(69,255,54,.36);
      border-radius: 30px;
      background: rgba(0,0,0,.68);
      box-shadow: 0 0 34px rgba(69,255,54,.18), 0 18px 60px rgba(0,0,0,.42);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.8rem, 12vw, 6rem);
      line-height: .86;
      letter-spacing: -.08em;
      text-transform: uppercase;
      background: var(--rainbow);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 8px 0 rgba(0,0,0,.75));
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.45;
    }

    a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 999px;
      color: #050505;
      background: var(--green);
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 1000;
      box-shadow: 0 9px 0 rgba(0,0,0,.72);
    }
  </style>

  <script>
    sessionStorage.removeItem("hyphsworld_vault_access");
    sessionStorage.removeItem("hyphsworld_vault_access_time");
  </script>
</head>

<body>
  <main class="card">
    <h1>Logged Out</h1>
    <p>Vault access session cleared. Buck locked the door. Duck Sauce is still talking.</p>
    <a href="login.html">Return To Login</a>
  </main>
</body>
</html>
