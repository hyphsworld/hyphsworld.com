<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HYPHSWORLD | Vault Logout</title>
  <meta name="description" content="Logout from the HYPHSWORLD Vault access session." />

  <style>
    :root {
      --black: #030603;
      --green: #39ff14;
      --red: #ff243d;
      --white: #f8fff8;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--white);
      background:
        radial-gradient(circle at 20% 20%, rgba(57,255,20,.2), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,36,61,.18), transparent 32%),
        var(--black);
      font-family: Arial Black, Impact, system-ui, sans-serif;
      text-align: center;
    }

    .card {
      width: min(620px, 100%);
      padding: 32px;
      border: 2px solid rgba(57,255,20,.44);
      border-radius: 26px;
      background: rgba(0,0,0,.62);
      box-shadow: 0 0 36px rgba(57,255,20,.18);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 11vw, 5rem);
      line-height: .9;
      color: var(--green);
      text-transform: uppercase;
    }

    p {
      margin: 0 0 22px;
      font-family: system-ui, sans-serif;
      font-weight: 900;
      color: rgba(248,255,248,.78);
    }

    a {
      display: inline-flex;
      padding: 13px 18px;
      border-radius: 999px;
      color: #050505;
      background: var(--green);
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 0 8px 0 #166b0b;
    }
  </style>

  <script>
    sessionStorage.removeItem("hyphsworld_vault_access");
    sessionStorage.removeItem("hyphsworld_vault_access_time");
  </script>
</head>

<body>
  <main class="card">
    <h1>Logged Out</h1>
    <p>Vault access session cleared. Buck said the door is locked again.</p>
    <a href="login.html">Return to Login</a>
  </main>
</body>
</html>
