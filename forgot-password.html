<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYPHSWORLD | Forgot Password</title>
  <meta name="description" content="Recover your HYPHSWORLD account and keep your Cool Points locked to your profile." />
  <link rel="stylesheet" href="auth.css" />
  <script src="site-analytics.js" defer></script>
</head>
<body>
  <main class="auth-shell">
    <section class="card">
      <p class="mini-kicker">AMS WEST ACCOUNT RECOVERY</p>
      <h1>Forgot Password</h1>
      <p class="sub">Enter the email on your HYPHSWORLD account. We’ll send a secure reset link so your Cool Points stay with your profile.</p>

      <div id="message" class="message" role="status" aria-live="polite"></div>

      <form id="forgotPasswordForm" class="panel">
        <h2>Send Reset Link</h2>
        <label>Email <input id="resetEmail" type="email" autocomplete="email" required /></label>
        <button type="submit">Send Password Reset</button>
      </form>

      <div class="actions">
        <a href="auth.html">Back to Sign In</a>
        <a href="login.html">Vault Terminal</a>
        <a href="index.html">Back Home</a>
      </div>
    </section>
  </main>

  <script src="password-reset.js"></script>
  <script>
    const form = document.getElementById('forgotPasswordForm');
    const email = document.getElementById('resetEmail');
    const message = document.getElementById('message');

    function say(text, type) {
      message.textContent = text;
      message.className = 'message ' + (type || '');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      say('Sending reset link…');
      try {
        await HWPasswordReset.sendResetEmail(email.value);
        say('Reset link sent. Check your email, then open the newest HYPHSWORLD reset link.', 'success');
        form.reset();
      } catch (error) {
        say(error.message || 'Password reset failed. Try again.', 'error');
      }
    });
  </script>
</body>
</html>
