<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYPHSWORLD | Update Password</title>
  <meta name="description" content="Create a new HYPHSWORLD password after account recovery." />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="card">
      <p class="mini-kicker">AMS WEST SECURE RESET</p>
      <h1>Update Password</h1>
      <p class="sub">Create a new password from the reset email. Once it saves, sign back in and your Cool Points should still be locked to your account.</p>

      <div id="message" class="message" role="status" aria-live="polite">Waiting for reset session…</div>

      <form id="updatePasswordForm" class="panel">
        <h2>New Password</h2>
        <label>New Password <input id="newPassword" type="password" minlength="6" autocomplete="new-password" required /></label>
        <label>Confirm Password <input id="confirmPassword" type="password" minlength="6" autocomplete="new-password" required /></label>
        <button type="submit">Save New Password</button>
      </form>

      <div class="actions">
        <a href="auth.html">Back to Sign In</a>
        <a href="forgot-password.html">Send New Link</a>
        <a href="index.html">Back Home</a>
      </div>
    </section>
  </main>

  <script src="password-reset.js"></script>
  <script>
    const form = document.getElementById('updatePasswordForm');
    const password = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const message = document.getElementById('message');

    function say(text, type) {
      message.textContent = text;
      message.className = 'message ' + (type || '');
    }

    window.addEventListener('load', () => {
      say('Enter your new password from the secure reset session.', 'success');
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const next = password.value.trim();
      const confirm = confirmPassword.value.trim();

      if (next.length < 6) {
        say('Password must be at least 6 characters.', 'error');
        password.focus();
        return;
      }

      if (next !== confirm) {
        say('Passwords do not match.', 'error');
        confirmPassword.focus();
        return;
      }

      say('Saving new password…');
      try {
        await HWPasswordReset.updatePassword(next);
        say('Password updated. You can sign in now.', 'success');
        form.reset();
        setTimeout(() => { location.href = 'auth.html'; }, 1400);
      } catch (error) {
        say(error.message || 'Password update failed. Open the newest reset email and try again.', 'error');
      }
    });
  </script>
</body>
</html>
