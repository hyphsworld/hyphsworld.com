</html><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYPHSWORLD App</title>
  <meta name="description" content="HYPHSWORLD streaming app mode.">
  <link rel="stylesheet" href="app-player.css">
</head>
<body>
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>

  <main class="app-shell">
    <section class="app-hero">
      <div class="topbar">
        <a class="ghost-btn" href="index.html">← Back</a>
        <div class="brand">HYPHSWORLD APP</div>
        <a class="ghost-btn" href="https://youtube.com/@the01showtv?si=ZzIx6jWoJQVdXt_8" target="_blank" rel="noreferrer">01 SHOW</a>
      </div>

      <div class="hero-grid">
        <div class="cover-wrap">
          <img id="coverArt" src="player-cover.jpg" alt="Hyphsworld 5 cover">
        </div>

        <div class="player-side">
          <p class="eyebrow">NOW PLAYING</p>
          <h1 id="trackTitle">THE WAY ft DejBae</h1>
          <p id="trackMeta" class="meta">prod by K.M.T.</p>

          <div class="status-row">
            <span class="pill">APP MODE</span>
            <span class="pill pulse-pill">LIVE ENERGY</span>
          </div>

          <div class="progress-card">
            <input id="progress" type="range" min="0" max="100" value="0" step="0.1">
            <div class="time-row">
              <span id="currentTime">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>

          <div class="controls">
            <button id="prevBtn" class="control-btn" type="button">⏮</button>
            <button id="playBtn" class="control-btn play-btn" type="button">▶</button>
            <button id="nextBtn" class="control-btn" type="button">⏭</button>
          </div>

          <div class="stream-links">
            <a class="small-btn" href="https://hyperurl.co/6agism" target="_blank" rel="noreferrer">More Music</a>
            <a class="small-btn" href="https://youtube.com/@amswesttv?si=c06g-hoCTUKzHBxk" target="_blank" rel="noreferrer">AMS WEST TV</a>
          </div>
        </div>
      </div>
    </section>

    <section class="queue-section">
      <div class="queue-head">
        <h2>Queue</h2>
        <span>3 previews loaded</span>
      </div>

      <div id="playlist" class="playlist">
        <button class="track-item active" data-index="0" type="button">
          <span class="track-num">01</span>
          <span class="track-copy">
            <strong>THE WAY ft DejBae</strong>
            <small>prod by K.M.T.</small>
          </span>
        </button>

        <button class="track-item" data-index="1" type="button">
          <span class="track-num">02</span>
          <span class="track-copy">
            <strong>YOU BAD ft DejBae</strong>
            <small>prod by Cuz Zaid</small>
          </span>
        </button>

        <button class="track-item" data-index="2" type="button">
          <span class="track-num">03</span>
          <span class="track-copy">
            <strong>BOUT YOU</strong>
            <small>prod by unknown</small>
          </span>
        </button>
      </div>
    </section>
  </main>

  <audio id="audio"></audio>
  <script src="app-player.js"></script>
</body>
</html>
