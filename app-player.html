<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYPHSWORLD Player</title>
  <link rel="stylesheet" href="app-player.css" />
</head>
<body>

  <div class="player-container">

    <div class="top-bar">
      <h1>NOW PLAYING</h1>
      <a href="index.html">← Back</a>
    </div>

    <div class="cover">
      <img id="coverArt" src="album-art.jpg" />
    </div>

    <h2 id="trackTitle">WHAT’S HANNIN</h2>
    <p id="trackArtist">Hyph Life ft 3D The Capo, Thali — prod by Cuz Zaid</p>

    <audio id="audio"></audio>

    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
    </div>

    <div class="progress-wrap">
      <span id="current">0:00</span>
      <input type="range" id="progress" min="0" max="100" value="0">
      <span id="duration">0:00</span>
    </div>

    <div class="volume">
      <label>Volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.01">
    </div>

    <h3>QUEUE</h3>

    <div class="queue" id="queue"></div>

  </div>

  <script src="app-player.js"></script>

</body>
</html>
