<body>

  <main class="app-shell">
    <section class="app-hero">

      <div class="hero-grid">

        </div>

        <div class="player-side">
          <p class="eyebrow">NOW PLAYING</p>
          <h1 id="trackTitle">WHAT’S HANNIN</h1>

          <div class="progress-card"> 
e<script>
const audio = document.getElementById("main-audio");

function playTrack(){
  audio.play();
}

function pauseTrack(){
  audio.pause();
}

/* VOLUME FIX */
const volume = document.getElementById("volume");

if (volume && audio) {
  volume.value = audio.volume;

  volume.addEventListener("input", function () {
    audio.volume = parseFloat(this.value);
  });
}
</script>
}
            <div class="time-row">
              <span id="currentTime">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>

          <div class="controls">
            <button id="prevBtn" class="control-btn" type="button">⏮</button>
            <button id="playBtn" class="control-btn play-btn" type="button">▶</button>
            <button id="nextBtn" class="control-btn" type="button">⏭</button>
          </div>

          <div class="volume-card">
            <label for="volume">Volume</label>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
          </div>
        </div>
      </div>
    </section>

    <section class="queue-section">

      <div id="playlist" class="playlist">
        <button class="track-item active" data-index="0" type="button">

          <span class="track-copy">
            <strong>WHAT’S HANNIN</strong>
            <small>Hyph Life ft 3D The Capo, Thali — prod by Cuz Zaid</small>
          </span>
        </button>

        <button class="track-item" data-index="1" type="button">
          <span class="track-num">02</span>
          <span class="track-copy">
            <strong>WITH ME</strong>
            <small>Hyph Life — prod K.M.T.</small>

          </span>
        </button>

        <button class="track-item" data-index="3" type="button">
          <span class="track-num">04</span>

            <strong>NO TRACE SNIP</strong>
            <small>Hyph Life — prod by Cuz Zaid</small>
          </span>

    </section>
