<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Full Player | HYPHSWORLD</title>
  <meta
    name="description"
    content="Full HYPHSWORLD player with featured records, Level 1 cuts, and Level 2 pressure."
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="app-player.css" />
</head>
<body data-page="player">
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <header class="site-header">
    <div class="wrap nav">
      <a href="index.html" class="brand">
        <div>
          <div class="brand-top">AMS WEST PRESENTS</div>
          <div class="brand-main">FULL PLAYER</div>
        </div>
      </a>

      <nav class="nav-links" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="vault-gate.html">Vault Gate</a>
        <a href="vault.html">Vault</a>
        <a href="merch.html">Merch</a>
      </nav>
    </div>
  </header>

  <main class="player-page">
    <section class="section">
      <div class="wrap">
        <div class="section-head">
          <div>
            <p class="eyebrow">HYPHSWORLD Audio</p>
            <h2>Full Player</h2>
          </div>
          <p class="section-copy">
            Featured picks up front, then Level 1 and Level 2 cuts in order.
          </p>
        </div>

        <div class="player-layout">
          <section class="feature-card player-stage">
            <img id="playerArt" class="player-art" src="album-art.jpg" alt="Current track artwork" width="1200" height="1200" />

            <div class="player-copy">
              <p class="eyebrow" id="playerSection">Featured</p>
              <h3 id="playerTitle">YOUNGIN REMIX</h3>
              <p class="section-copy" id="playerMeta">Main playlist</p>

              <audio id="playerAudio" preload="metadata"></audio>

              <div class="player-controls">
                <button class="btn btn-gold" id="prevBtn" type="button">◀ PREV</button>
                <button class="btn btn-dark" id="playBtn" type="button">▶ PLAY</button>
                <button class="btn btn-outline" id="nextBtn" type="button">NEXT ▶</button>
              </div>

              <div class="progress-card">
                <input id="playerProgress" type="range" min="0" max="100" value="0" step="0.1" aria-label="Player progress" />
                <div class="time-row">
                  <span id="currentTime">0:00</span>
                  <span id="durationTime">0:00</span>
                </div>
              </div>
            </div>
          </section>

          <section class="feature-card player-playlist">
            <div class="playlist-group">
              <p class="eyebrow">Featured</p>
              <div class="playlist" id="featuredList"></div>
            </div>

            <div class="playlist-group">
              <p class="eyebrow">Level 1</p>
              <div class="playlist" id="level1List"></div>
            </div>

            <div class="playlist-group">
              <p class="eyebrow">Level 2</p>
              <div class="playlist" id="level2List"></div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script src="app-player.js" defer></script>
</body>
</html>
