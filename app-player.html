<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYPHSWORLD Full Player</title>
  <meta
    name="description"
    content="HYPHSWORLD Full Player featuring Hyph Life, guest artists, and featured records."
  />
  <link rel="stylesheet" href="app-player.css" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CT7CWHCHYC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CT7CWHCHYC');
  </script>
</head>
<body>
  <div class="player-page-bg"></div>

  <header class="player-topbar">
    <div class="player-wrap topbar-inner">
      <a href="index.html" class="player-brand">
        <span class="player-brand-top">HYPHSWORLD</span>
        <span class="player-brand-main">FULL PLAYER</span>
      </a>

      <nav class="player-nav">
        <a href="index.html">Home</a>
        <a href="vault.html">Vault</a>
        <a href="index.html#shop">Merch</a>
      </nav>
    </div>
  </header>

  <main class="player-wrap player-main">
    <section class="player-hero">
      <div class="player-grid">
        <div class="player-cover-shell">
          <img id="coverArt" class="player-cover" src="album-art.jpg" alt="Now playing artwork">
        </div>

        <div class="player-info-shell">
          <p class="eyebrow">Artist Spotlight #1</p>
          <h1 id="songTitle">25/8</h1>
          <p id="songArtist" class="song-meta">Young Tez — prod by Marty McPhresh</p>

          <audio id="audio" preload="auto">
            <source src="25-8.mp3" type="audio/mpeg">
            Your browser does not support audio playback.
          </audio>

          <div class="player-controls-row">
            <button id="prevBtn" class="player-btn secondary" type="button">⏮ Prev</button>
            <button id="playBtn" class="player-btn primary" type="button">▶ Play</button>
            <button id="nextBtn" class="player-btn secondary" type="button">Next ⏭</button>
          </div>

          <div class="player-controls-row small-row">
            <button id="shuffleBtn" class="chip-btn" type="button">Shuffle</button>
            <button id="repeatBtn" class="chip-btn" type="button">Repeat</button>
          </div>

          <div class="seek-wrap">
            <input id="seekBar" type="range" min="0" max="100" value="0" step="0.1">
            <div class="time-row">
              <span id="currentTime">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>

          <div class="player-links">
            <a href="vault.html" class="player-link-pill">THE VAULT</a>
            <a href="index.html" class="player-link-pill">HOMEPAGE</a>
            <a href="index.html#shop" class="player-link-pill">MERCH</a>
          </div>
        </div>
      </div>
    </section>

    <section class="playlist-section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Public Rotation</p>
          <h2>ARTISTS + GUESTS</h2>
        </div>
        <p class="section-copy">
          The public player is for Hyph Life, featured artists, and guests. Project rooms live in THE VAULT.
        </p>
      </div>

      <div id="playlist" class="playlist-grid"></div>
    </section>
  </main>

  <script src="app-player.js"></script>
</body>
</html>
