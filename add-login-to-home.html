<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<body>

<a href="shop.html">Merch</a>
<a href="login.html" id="loginLink">LOGIN / JOIN</a>
<span id="welcomeUser" style="display:none;color:#f1d28a;font-weight:900;"></span>
</nav>

<script>
(function(){
const link=document.getElementById("loginLink");
const welcome=document.getElementById("welcomeUser");
const raw=localStorage.getItem("hyph_user");
if(raw){
 try{
   const user=JSON.parse(raw);
   if(user.username){
     if(link) link.style.display="none";
     welcome.style.display="inline-block";
     welcome.textContent="WELCOME BACK "+user.username.toUpperCase();
   }
 }catch(e){}
}
})();
</script>
</body>
</html>
