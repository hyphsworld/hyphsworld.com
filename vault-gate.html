<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault Access Pad | HYPHSWORLD</title>
  <meta name="description" content="Enter the HYPHSWORLD Vault access code." />
  <link rel="stylesheet" href="vault-gate.css" />
  <link rel="stylesheet" href="duck-helper.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-69CN3QYLK1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-69CN3QYLK1');
  </script>
</head>
<body>
  <div class="vault-bg"></div>
  <div class="vault-overlay"></div>

  <main class="gate-shell">
    <section class="gate-card" id="gateCard">
      <a class="back-link" href="index.html">← Back to HYPHSWORLD</a>

      <div class="brand-row">
        <img src="ams-logo.jpg" alt="AMS WEST logo" onerror="this.style.display='none'">
        <div>
          <p>AMS WEST PRESENTS</p>
          <h1>VAULT ACCESS</h1>
        </div>
      </div>

      <div class="vault-lock">
        <span class="lock-light"></span>
        <strong>DO YOU KNOW THE CODE?</strong>
      </div>

      <p class="gate-copy">
        Enter the access code to unlock the HYPHSWORLD Vault.
        Watch the ticker. Listen to Duck Sauce. The clues are in the world.
      </p>

      <div class="code-display" id="codeDisplay">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="keypad" aria-label="Vault keypad">
        <button type="button" data-key="1">1</button>
        <button type="button" data-key="2">2</button>
        <button type="button" data-key="3">3</button>
        <button type="button" data-key="4">4</button>
        <button type="button" data-key="5">5</button>
        <button type="button" data-key="6">6</button>
        <button type="button" data-key="7">7</button>
        <button type="button" data-key="8">8</button>
        <button type="button" data-key="9">9</button>
        <button type="button" data-key="CLEAR">CLR</button>
        <button type="button" data-key="0">0</button>
        <button type="button" data-key="BACK">⌫</button>
      </div>

      <div class="word-code-row">
        <input id="wordCodeInput" type="text" placeholder="Or type word code: HYPH / DUCK / AMS" autocomplete="off">
      </div>

      <button class="unlock-btn" id="unlockBtn" type="button">UNLOCK VAULT</button>

      <p class="gate-message" id="gateMessage">Access pad online.</p>

      <div class="hint-strip">
        <span>WELCOME 2 HYPHSWORLD</span>
        <span>✦</span>
        <span>DO YOU KNOW THE CODE</span>
      </div>
    </section>
  </main>

  <div id="duck-helper"></div>
  <script src="duck-helper.js"></script>
  <script src="vault-gate.js"></script>
</body>
</html>
