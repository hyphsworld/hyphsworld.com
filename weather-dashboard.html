<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <script>
        async function fetchWeather() {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true');
            const data = await response.json();
            document.getElementById('weather').innerHTML = `Current Temperature: ${data.current_weather.temperature} °C`;
        }

        window.onload = fetchWeather;
    </script>
</head>
<body>
    <h1>Weather Dashboard</h1>
    <div id="weather">Loading...</div>
</body>
</html>
